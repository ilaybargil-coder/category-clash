services:
  - type: web
    name: category-clash-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./scripts/render-start.sh
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: WEBSOCKET_ORIGINS
        sync: false
      - key: WEBSOCKET_ALLOW_MISSING_ORIGIN
        value: "false"
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_POOL_RECYCLE_SECONDS
        value: "300"
      - key: READINESS_TIMEOUT_SECONDS
        value: "3"
