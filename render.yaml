services:
  - type: web
    name: category-clash-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./scripts/render-start.sh
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_MODE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_AUTH_TIMEOUT_SECONDS
        value: "5"
      - key: AUTH_IDENTITY_CACHE_SECONDS
        value: "300"
      - key: CORS_ORIGINS
        sync: false
      - key: WEBSOCKET_ORIGINS
        sync: false
      - key: WEBSOCKET_ALLOW_MISSING_ORIGIN
        value: "false"
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_POOL_RECYCLE_SECONDS
        value: "300"
      - key: READINESS_TIMEOUT_SECONDS
        value: "3"
      - key: FUZZY_MATCHING_ENABLED
        value: "true"
      - key: FUZZY_MAX_DISTANCE
        value: "1"
      - key: FUZZY_MIN_LENGTH
        value: "4"
      - key: UNIQUE_PREFIX_MATCHING_ENABLED
        value: "true"
      - key: UNIQUE_PREFIX_MIN_LENGTH
        value: "3"
      - key: DEFINITE_ARTICLE_MATCHING_ENABLED
        value: "true"
