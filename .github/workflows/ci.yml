name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: game
          POSTGRES_PASSWORD: game
          POSTGRES_DB: game
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U game -d game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://game:game@localhost:5432/game
      JWT_SECRET: ci-only-secret-at-least-32-bytes-long
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m alembic upgrade head
      - run: python -m app.seed
      - run: python -m scripts.audit_question_bank
      - run: ruff check app tests scripts
      - run: ruff format --check app tests scripts
      - run: mypy app
      - run: RUN_DB_INTEGRATION=1 python -m pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.invalid
          NEXT_PUBLIC_WS_URL: wss://api.example.invalid
      - run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.invalid
          NEXT_PUBLIC_WS_URL: wss://api.example.invalid
