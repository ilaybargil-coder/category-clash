name: Scheduled question bank audit

on:
  schedule:
    - cron: "17 4 * * 1,4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m scripts.audit_question_bank
      - run: pytest -q tests/test_question_bank_continuous.py tests/test_question_bank_expansion_v3.py

