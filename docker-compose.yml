services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
      POSTGRES_DB: game
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d game"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --ws-max-size 4096"
    environment:
      DATABASE_URL: postgresql+asyncpg://game:game@db:5432/game
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-at-least-32-bytes}
      CORS_ORIGINS: http://localhost:3000
      WEBSOCKET_ORIGINS: http://localhost:3000
      TURN_SECONDS: ${TURN_SECONDS:-15}
      ROUNDS_TO_WIN: ${ROUNDS_TO_WIN:-2}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
